name: API Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run API in background
        run: npm start &

      - name: Wait for API healthcheck
        run: |
          until curl -sSf http://localhost:3000/healthcheck > /dev/null; do
            echo "Waiting for API..."
            sleep 2
          done

      - name: Run API tests
        run: npm test

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run load tests (k6)
        run: npm run test:load:login
